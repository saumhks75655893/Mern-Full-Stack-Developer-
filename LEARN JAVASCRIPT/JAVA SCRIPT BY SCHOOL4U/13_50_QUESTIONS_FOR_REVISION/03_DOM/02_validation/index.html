<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Real-Time DOM Update</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="inputFields">
    <div class="inputItems">
      <label for="name">Name</label>
      <input type="text" id="name" placeholder="Enter your name">
    </div>

    <div class="inputItems">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="Enter your email">
    </div>

  </div>

  <div class="livePreview">
    <h3>Preview</h3>
    <p id="namePreview">Name: <span class="nameValue">Name will be shown here</span></p>
    <p id="emailPreview">Email: <span class="emailValue">Email will be shown here</span></p>
  </div>
  <script src="script.js"></script>

</body>

</html>
