<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIMPLE CALCULATOR </title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="calBody">
    <div class="displayResult">0</div>
    <div class="buttonCal">
      <button class="clearBtn">C</button>
      <button class="operator">+</button>

      <button>1</button>
      <button>2</button>
      <button>3</button>
      <button class="operator">-</button>

      <button>4</button>
      <button>5</button>
      <button>6</button>
      <button class="operator">*</button>

      <button>7</button>
      <button>8</button>
      <button>9</button>
      <button class="operator">/</button>

      <button class="zero">0</button>
      <button class="decimal">.</button>
      <button class="equalBtn">=</button>


    </div>

  </div>




  <script src="simpleCalculator.js"></script>
</body>

</html>
