<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIMPLE CALCULATOR </title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="calBody">
    <div class="displayResult">0</div>
    <div class="buttonCal">
      <button class="clearBtn" onclick="clearDisplay('C')">C</button>
      <button class="operator" onclick="appendValue('+')">+</button>

      <button onclick="appendValue('1')">1</button>
      <button onclick="appendValue('2')">2</button>
      <button onclick="appendValue('3')">3</button>
      <button class="operator" onclick="appendValue('-')">-</button>

      <button onclick="appendValue('4')">4</button>
      <button onclick="appendValue('5')">5</button>
      <button onclick="appendValue('6')">6</button>
      <button class="operator" onclick="appendValue('*')">*</button>

      <button onclick="appendValue('7')">7</button>
      <button onclick="appendValue('8')">8</button>
      <button onclick="appendValue('9')">9</button>
      <button class="operator" onclick="appendValue('/')">/</button>

      <button class="zero" onclick="appendValue('0')">0</button>
      <button class="decimal" onclick="appendValue('.')">.</button>
      <button class="equalBtn" onclick="calculatedValue('=')">=</button>


    </div>

  </div>




  <script src="simpleCalculator.js"></script>
</body>

</html>
