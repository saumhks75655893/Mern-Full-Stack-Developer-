<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Real-Time DOM Update</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="inputFields">
    <h1 style="text-align: center;">FORM VALIDATION</h1>
    <p class="nameError" style="color: rgb(255, 42, 42);"></p>
    <div class="inputItems">
      <label for="name">Name</label>
      <input type="text" id="name" placeholder="Enter your name">
    </div>

    <p class="emailError" style="color: rgb(255, 42, 42);"></p>
    <div class="inputItems">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="Enter your email">
    </div>

    <p class="passwordError" style="color: rgb(255, 42, 42);"></p>
    <div class="inputItems">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter your password">
    </div>

  </div>

  <script src="script.js"></script>

</body>

</html>
