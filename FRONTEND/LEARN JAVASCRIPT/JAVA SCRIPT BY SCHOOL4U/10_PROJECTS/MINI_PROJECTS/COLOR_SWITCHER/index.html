<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>COLOR SWITCHER</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">
    <h1 class="heading">Color Changer</h1>
    <div class="inputContainer">
      <button class="randomColor">Random Color</button>
      <input type="text" placeholder="Enter a color or hex(e.g. white or #ffffff)" id="inputColor">
      <button class="applyColor">Apply Color</button>
    </div>
    <p class="colorContainer">Current Color : <span class="colorName">lightblue</span></p>
  </div>

  <script src="colorSwitcherScript.js"></script>
</body>

</html>
