<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MODULES</title>
  <style>
    * {
      width: 100%;
      height: 100%;
      box-sizing: border-box;
      background-color: rgb(6, 0, 21);
      color: white;
      margin: auto;
      padding: 0;
    }

    h1 {
      text-align: center;
      width: 100%;
      height: 50px;
      background-color: rgb(30, 2, 2);
      padding: 5px;
      border: 1px solid rgb(43, 13, 13);
      box-shadow: 0.5px 0.5px 1px white;
      position: fixed;
      top: 0;
      z-index: 99;
    }

    p {
      width: 80%;
      padding: 20px;
      position: relative;
      top: 50px;
      bottom: 20px;
      font-size: 20px;
      text-align: justify;
      padding-bottom: 20px;
    }
  </style>

</head>

<body>
  <h1>MODULES</h1>

  
  <script src="script.js"></script>
</body>

</html>
