<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BEFORE AND AFTER PSEUDO ELEMENTS</title>
</head>
<style>
  *{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  body,html{
    width: 100%;
    height: 100%;
  }
  .main{
    width: 200px;
    height: 200px;
    background-color: #752d2d;
    color: white;
    display:none;

  }
  .main::before{
    content: "😍";
  }
  .main::after{
    content: "😎";
  }

  button{
    width: 300px;
    height: 150px;
    background-color: #eb0808;
    color: white;
    border: none;
    cursor: pointer;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 20px;
    font-weight: bold;
    border-radius: 10px;
    z-index: 1;
  }

  button::before{
    content:"";
    width: 100%;
    height: 100%;
    position: absolute;
    top: 0;
    left: 0;
    background-color: #ff000072;
    border-radius: 10px;
    transition: 0.3s ease;
    z-index: -1;
  }
  button:hover::before{
    transform: scale(1.4);
    opacity: 0;
  }
  
</style>
<body>
  <div class="main">Hellow this is me</div>

  <button>Click Me</button>
</body>
</html>
